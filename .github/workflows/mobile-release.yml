name: Mobile Release APK

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "已有的 mobile-v<versionName> Tag"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    environment: android-release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release Tag and version
        shell: bash
        run: |
          node packages/mobile/scripts/validate-mobile-release-tag.js "$RELEASE_TAG"
          TAG_COMMIT="$(git rev-list -n 1 "$RELEASE_TAG")"
          test -n "$TAG_COMMIT"
          test "$(git rev-parse HEAD)" = "$TAG_COMMIT"
          git fetch origin main --no-tags
          git merge-base --is-ancestor HEAD origin/main

      - name: Run mobile tests
        run: pnpm --filter @aichat/mobile test

      - name: Run mobile type-check
        run: pnpm mobile:type-check

      - name: Restore release keystore
        shell: bash
        env:
          AICHAT_ANDROID_KEYSTORE_BASE64: ${{ secrets.AICHAT_ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$AICHAT_ANDROID_KEYSTORE_BASE64"
          install -d -m 700 "$RUNNER_TEMP/aichat-android-signing"
          printf '%s' "$AICHAT_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/aichat-android-signing/release.keystore"
          chmod 600 "$RUNNER_TEMP/aichat-android-signing/release.keystore"

      - name: Build and verify signed APK
        env:
          AICHAT_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/aichat-android-signing/release.keystore
          AICHAT_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AICHAT_ANDROID_KEYSTORE_PASSWORD }}
          AICHAT_ANDROID_KEY_ALIAS: ${{ secrets.AICHAT_ANDROID_KEY_ALIAS }}
          AICHAT_ANDROID_KEY_PASSWORD: ${{ secrets.AICHAT_ANDROID_KEY_PASSWORD }}
        run: pnpm --filter @aichat/mobile android:build-apk

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          VERSION_NAME="${RELEASE_TAG#refs/tags/}"
          VERSION_NAME="${VERSION_NAME#mobile-v}"
          ASSET_DIR="$RUNNER_TEMP/aichat-mobile-release"
          install -d "$ASSET_DIR"
          cp packages/mobile/android/app/build/outputs/apk/release/app-release.apk "$ASSET_DIR/aichat-mobile-$VERSION_NAME.apk"
          cp packages/mobile/android/app/build/outputs/apk/release/app-release.apk.sha256 "$ASSET_DIR/aichat-mobile-$VERSION_NAME.apk.sha256"
          sed -i "s/app-release.apk/aichat-mobile-$VERSION_NAME.apk/" "$ASSET_DIR/aichat-mobile-$VERSION_NAME.apk.sha256"
          echo "apk=$ASSET_DIR/aichat-mobile-$VERSION_NAME.apk" >> "$GITHUB_OUTPUT"
          echo "sha256=$ASSET_DIR/aichat-mobile-$VERSION_NAME.apk.sha256" >> "$GITHUB_OUTPUT"
          echo "tag=mobile-v$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aichat-mobile-${{ steps.assets.outputs.version }}
          path: |
            ${{ steps.assets.outputs.apk }}
            ${{ steps.assets.outputs.sha256 }}
          if-no-files-found: error

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.assets.outputs.apk }}

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.assets.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${{ steps.assets.outputs.apk }}" "${{ steps.assets.outputs.sha256 }}" --clobber
          else
            gh release create "$TAG" "${{ steps.assets.outputs.apk }}" "${{ steps.assets.outputs.sha256 }}" --verify-tag --generate-notes --title "AIChat Mobile ${TAG#mobile-v}"
          fi

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/aichat-android-signing/release.keystore"
